<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Realm Board{% endblock %} — Minecraft Realm</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['"Courier New"', 'monospace'] },
          colors: {
            grass: { 700: '#2d6a2d', 800: '#1e4d1e', 600: '#3a8a3a' },
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .nav-link { @apply text-green-100 hover:text-white hover:bg-green-700 px-3 py-2 rounded text-sm font-medium transition-colors; }
    .nav-link.active { @apply bg-green-700 text-white; }
    .btn { @apply inline-flex items-center px-3 py-1.5 rounded text-sm font-medium transition-colors; }
    .btn-primary { @apply btn bg-green-700 text-white hover:bg-green-600; }
    .btn-secondary { @apply btn bg-gray-100 text-gray-700 hover:bg-gray-200 border border-gray-300; }
    .btn-danger { @apply btn bg-red-600 text-white hover:bg-red-700; }
    .btn-sm { @apply px-2 py-1 text-xs; }
    .card { @apply bg-white rounded-lg shadow-sm border border-gray-200; }
    .input { @apply w-full rounded border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500; }
    .label { @apply block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wide; }
  </style>
</head>
<body class="bg-stone-100 h-full">

<!-- Nav -->
<nav class="bg-green-800 shadow-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4">
    <div class="flex items-center h-12 gap-1">
      <!-- Brand -->
      <a href="{{ url_for('board') }}" class="text-white font-bold text-base mr-3 shrink-0">⛏ Realm Board</a>

      <!-- Desktop nav -->
      <div class="hidden sm:flex items-center gap-0.5 flex-1">
        <a href="{{ url_for('board') }}" class="nav-link {% if request.endpoint == 'board' %}active{% endif %}">Board</a>
        <a href="{{ url_for('proposals') }}" class="nav-link {% if request.endpoint in ('proposals','new_proposal','edit_proposal') %}active{% endif %}">Proposals</a>
        <a href="{{ url_for('ideas') }}" class="nav-link {% if request.endpoint == 'ideas' %}active{% endif %}">Ideas</a>
        <a href="{{ url_for('base_info') }}" class="nav-link {% if request.endpoint == 'base_info' %}active{% endif %}">Base Info</a>
        <a href="{{ url_for('settings') }}" class="nav-link {% if request.endpoint == 'settings' %}active{% endif %}">Settings</a>
      </div>
      <div class="hidden sm:block ml-auto">
        <a href="{{ url_for('logout') }}" class="nav-link text-xs">Logout</a>
      </div>

      <!-- Mobile hamburger -->
      <div class="sm:hidden ml-auto flex gap-2">
        <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')"
          class="text-green-100 hover:text-white p-1">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile menu -->
    <div id="mobile-menu" class="hidden sm:hidden pb-2 flex flex-col gap-0.5">
      <a href="{{ url_for('board') }}" class="nav-link {% if request.endpoint == 'board' %}active{% endif %}">Board</a>
      <a href="{{ url_for('proposals') }}" class="nav-link {% if request.endpoint in ('proposals','new_proposal','edit_proposal') %}active{% endif %}">Proposals</a>
      <a href="{{ url_for('ideas') }}" class="nav-link {% if request.endpoint == 'ideas' %}active{% endif %}">Ideas</a>
      <a href="{{ url_for('base_info') }}" class="nav-link {% if request.endpoint == 'base_info' %}active{% endif %}">Base Info</a>
      <a href="{{ url_for('settings') }}" class="nav-link {% if request.endpoint == 'settings' %}active{% endif %}">Settings</a>
      <a href="{{ url_for('logout') }}" class="nav-link text-xs">Logout</a>
    </div>
  </div>
</nav>

<!-- Page content -->
<main class="max-w-7xl mx-auto px-4 py-6">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, msg in messages %}
    <div class="mb-4 px-4 py-2 rounded text-sm
        {% if category == 'error' %}bg-red-100 text-red-700 border border-red-300
        {% else %}bg-green-100 text-green-700 border border-green-300{% endif %}">
      {{ msg }}
    </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>

</body>
</html>
