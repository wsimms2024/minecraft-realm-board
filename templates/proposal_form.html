{% extends "base.html" %}
{% block title %}{{ 'Edit' if project else 'New' }} Proposal{% endblock %}
{% block content %}

<div class="max-w-xl mx-auto">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">
    {{ '✏️ Edit Proposal' if project else '+ New Proposal' }}
  </h1>

  <div class="card p-6">
    <form method="post"
      action="{{ url_for('edit_proposal', project_id=project.id) if project else url_for('new_proposal') }}"
      class="space-y-4">

      <div>
        <label class="label">Title *</label>
        <input type="text" name="title" required
          value="{{ project.title if project else prefill_title }}"
          class="input" placeholder="e.g. Iron Farm" />
      </div>

      <div>
        <label class="label">Category</label>
        <select name="category" class="input">
          <option value="">— Select category —</option>
          {% for cat in all_categories %}
          <option value="{{ cat }}"
            {% if (project and project.category == cat) or (not project and prefill_category == cat) %}selected{% endif %}>
            {{ cat }}
          </option>
          {% endfor %}
          <option value="Other"
            {% if (project and project.category == 'Other') %}selected{% endif %}>
            Other
          </option>
        </select>
      </div>

      <div>
        <label class="label">Description</label>
        <textarea name="description" rows="3" class="input"
          placeholder="What is this build? Why do we want it?">{{ project.description if project else '' }}</textarea>
      </div>

      <div>
        <label class="label">Proposed by</label>
        <select name="proposed_by_id" class="input">
          <option value="">— Select friend —</option>
          {% for friend in friends %}
          <option value="{{ friend.id }}"
            {% if project and project.proposed_by_id == friend.id %}selected{% endif %}>
            {{ friend.name }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit" class="btn-primary">
          {{ 'Save Changes' if project else 'Create Proposal' }}
        </button>
        <a href="{{ url_for('proposals') }}" class="btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
