services:
  - type: web
    name: minecraft-realm-board
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 60
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SITE_PASSWORD
        sync: false        # Set manually in Render dashboard
      - key: DATABASE_URL
        sync: false        # Paste your Neon/Supabase connection string here
      - key: PYTHON_VERSION
        value: 3.11.0
